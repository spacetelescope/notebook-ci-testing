name: Release and Version Management

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Type of version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      pre_release:
        description: 'Create pre-release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    outputs:
      new_version: ${{ steps.version.outputs.new_tag }}
      changelog: ${{ steps.version.outputs.changelog }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine Version Bump from PR Labels
      if: github.event_name == 'pull_request'
      id: pr_version
      uses: actions/github-script@v8
      with:
        result-encoding: string
        script: |
          const labels = context.payload.pull_request.labels.map(l => l.name);

          if (labels.includes('version:major') || labels.includes('breaking-change')) {
            return 'major';
          } else if (labels.includes('version:minor') || labels.includes('feature')) {
            return 'minor';
          } else if (labels.includes('version:patch') || labels.includes('bugfix')) {
            return 'patch';
          } else {
            // Default to patch if no version label found
            core.warning('No version label found, defaulting to patch');
            return 'patch';
          }

    - name: Get Latest Version
      id: latest_version
      run: |
        # Get the latest semantic version tag (ignore non-semantic tags)
        latest_tag=$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "v0.0.0")
        echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

        # Extract version numbers
        version=${latest_tag#v}
        IFS='.' read -r major minor patch <<< "$version"

        # Ensure we have valid numbers
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}

        echo "current_major=$major" >> $GITHUB_OUTPUT
        echo "current_minor=$minor" >> $GITHUB_OUTPUT
        echo "current_patch=$patch" >> $GITHUB_OUTPUT

    - name: Calculate New Version
      id: version
      run: |
        major=${{ steps.latest_version.outputs.current_major }}
        minor=${{ steps.latest_version.outputs.current_minor }}
        patch=${{ steps.latest_version.outputs.current_patch }}

        # Ensure we have valid numbers
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}

        # Determine bump type
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          bump_type="${{ github.event.inputs.version_bump }}"
        else
          bump_type="${{ steps.pr_version.outputs.result }}"
        fi

        echo "Current version: v$major.$minor.$patch"
        echo "Bump type: $bump_type"

        # Calculate new version
        case $bump_type in
          major)
            major=$((major + 1))
            minor=0
            patch=0
            ;;
          minor)
            minor=$((minor + 1))
            patch=0
            ;;
          patch)
            patch=$((patch + 1))
            ;;
        esac

        new_version="v$major.$minor.$patch"

        # Add pre-release suffix if requested
        if [ "${{ github.event.inputs.pre_release }}" == "true" ]; then
          new_version="$new_version-rc.1"
        fi

        echo "New version: $new_version"
        echo "new_tag=$new_version" >> $GITHUB_OUTPUT
        echo "new_version=$new_version" >> $GITHUB_OUTPUT
        echo "major_version=v$major" >> $GITHUB_OUTPUT

    - name: Generate Changelog
      id: changelog
      run: |
        # Get commits since last tag
        last_tag=${{ steps.latest_version.outputs.latest_tag }}

        if [ "$last_tag" != "v0.0.0" ]; then
          changelog=$(git log --pretty=format:"- %s (%h)" $last_tag..HEAD)
        else
          changelog=$(git log --pretty=format:"- %s (%h)")
        fi

        # Save changelog to output
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$changelog" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ vars.PYTHON_VERSION || '3.11' }}

    - name: Bump roman_dependencies version and pin requirements
      run: |
        # Determine bump type (mirrors Calculate New Version logic)
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          bump_type="${{ github.event.inputs.version_bump }}"
        else
          bump_type="${{ steps.pr_version.outputs.result }}"
        fi

        # Read current CalVer from pyproject.toml (YYYY.major.minor)
        current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        cal_year=$(echo "$current" | cut -d. -f1)
        cal_major=$(echo "$current" | cut -d. -f2)
        cal_minor=$(echo "$current" | cut -d. -f3)
        this_year=$(date +%Y)

        if [ "$cal_year" != "$this_year" ]; then
          # New calendar year — reset counters
          new_calver="${this_year}.1.0"
        else
          case $bump_type in
            patch)
              new_calver="${this_year}.${cal_major}.$((cal_minor + 1))"
              ;;
            minor|major)
              new_calver="${this_year}.$((cal_major + 1)).0"
              ;;
          esac
        fi

        echo "CalVer bump: $current -> $new_calver"

        # Update pyproject.toml
        sed -i "s/^version = .*/version = \"$new_calver\"/" pyproject.toml

        # Pin roman_dependencies in all notebook requirements.txt
        find notebooks -name requirements.txt | while IFS= read -r f; do
          sed -i "s|roman_dependencies[^[:space:]]*|roman_dependencies==$new_calver|" "$f"
        done

    - name: Commit version bumps
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        new_calver=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        git add pyproject.toml notebooks/*/requirements.txt
        git commit -m "Bump roman_dependencies to $new_calver" || echo "Nothing to commit"

    - name: Build package
      run: |
        pip install --upgrade build
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Push the version bump commit to main before tagging
        git push origin HEAD:main

        echo "Creating tag ${{ steps.version.outputs.new_tag }} at HEAD"

        git tag -a "${{ steps.version.outputs.new_tag }}" HEAD \
          -m "Release ${{ steps.version.outputs.new_tag }}"

        git push origin "${{ steps.version.outputs.new_tag }}"

    - name: Write release notes
      run: |
        cat > release-notes.md <<'EOF'
        ## Changes in ${{ steps.version.outputs.new_tag }}

        ${{ steps.changelog.outputs.changelog }}

        ### Workflow Usage

        Use this version in your workflows:
        ```yaml
        # Pin to major version (recommended)
        uses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${{ steps.version.outputs.major_version }}

        # Pin to exact version (most stable)
        uses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${{ steps.version.outputs.new_tag }}
        ```

        **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.latest_version.outputs.latest_tag }}...${{ steps.version.outputs.new_tag }}
        EOF

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        args=(
          "${{ steps.version.outputs.new_tag }}"
          --title "Release ${{ steps.version.outputs.new_tag }}"
          --notes-file release-notes.md
          --verify-tag
        )

        if [[ "${{ github.event.inputs.pre_release }}" == "true" ]]; then
          args+=(--prerelease)
        fi

        gh release create "${args[@]}"

    - name: Update Example Workflows
      run: |
        # Update examples to reference new major version
        major_version=${{ steps.version.outputs.major_version }}

        # Update all example workflow files
        find examples/workflows -name "*.yml" -type f -exec sed -i "s|your-org/dev-actions/|${{ github.repository }}/|g" {} \;
        find examples/workflows -name "*.yml" -type f -exec sed -i "s|@main|@$major_version|g" {} \;

        # Check if there are changes to commit
        if git diff --quiet; then
          echo "No changes to commit"
        else
          git add examples/workflows/
          git commit -m "Update example workflows to use $major_version"
          git push origin main
        fi

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success'

    steps:
    - name: Notify Success
      uses: actions/github-script@v8
      with:
        script: |
          // Create a comment on the PR if it was merged
          if (context.eventName === 'pull_request') {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Release Created Successfully!**

              **New Version:** \`${{ needs.release.outputs.new_version }}\`

              ### Usage in Workflows:
              \`\`\`yaml
              # Recommended: Pin to major version
              uses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@v${{ needs.release.outputs.new_version }}

              # Conservative: Pin to exact version
              uses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${{ needs.release.outputs.new_version }}
              \`\`\`

              [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.new_version }})`
            });
          }
