name: Release and Version Management

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Type of version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      pre_release:
        description: Create pre-release
        required: false
        type: boolean
        default: false

# Release numbers and moving tags are shared repository state. Queue release
# runs so two merges cannot calculate or publish the same next version.
concurrency:
  group: release-${{ github.repository }}
  queue: max

jobs:
  release:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_version: ${{ steps.version.outputs.new_tag }}
      major_version: ${{ steps.version.outputs.major_version }}
      calendar_tag: ${{ steps.calendar_version.outputs.calendar_tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: git fetch --force --tags origin

      - name: Resolve release commit
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_SHA: ${{ github.sha }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          target_commitish="$WORKFLOW_SHA"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            target_commitish="$MERGE_COMMIT_SHA"
          fi

          if [[ -z "$target_commitish" ]]; then
            echo "Unable to determine the release commit." >&2
            exit 1
          fi

          if ! git cat-file -e "${target_commitish}^{commit}" 2>/dev/null; then
            git fetch origin "$target_commitish"
          fi

          git cat-file -e "${target_commitish}^{commit}"

          echo "Release commit: $target_commitish"
          echo "target_commitish=$target_commitish" >> "$GITHUB_OUTPUT"

      - name: Determine Version Bump from PR Labels
        if: github.event_name == 'pull_request'
        id: pr_version
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const labels = context.payload.pull_request.labels.map((label) => label.name);

            if (labels.includes('version:major') || labels.includes('breaking-change')) {
              return 'major';
            }

            if (labels.includes('version:minor') || labels.includes('feature')) {
              return 'minor';
            }

            if (labels.includes('version:patch') || labels.includes('bugfix')) {
              return 'patch';
            }

            core.warning('No version label found, defaulting to patch');
            return 'patch';

      - name: Get Latest Stable Version
        id: latest_version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="v0.0.0"

          while IFS= read -r tag; do
            if [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              latest_tag="$tag"
              break
            fi
          done < <(git tag --list --sort=-version:refname)

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          echo "Latest stable tag: $latest_tag"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "current_major=${major:-0}" >> "$GITHUB_OUTPUT"
          echo "current_minor=${minor:-0}" >> "$GITHUB_OUTPUT"
          echo "current_patch=${patch:-0}" >> "$GITHUB_OUTPUT"

      - name: Validate release ancestry
        if: steps.latest_version.outputs.latest_tag != 'v0.0.0'
        shell: bash
        env:
          LATEST_TAG: ${{ steps.latest_version.outputs.latest_tag }}
          TARGET_COMMITISH: ${{ steps.target.outputs.target_commitish }}
        run: |
          set -euo pipefail

          if ! git merge-base --is-ancestor "$LATEST_TAG" "$TARGET_COMMITISH"; then
            echo "Release commit $TARGET_COMMITISH does not contain $LATEST_TAG." >&2
            echo "Run the release from an up-to-date main branch." >&2
            exit 1
          fi

      - name: Calculate New Version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_BUMP: ${{ inputs.version_bump }}
          PR_BUMP: ${{ steps.pr_version.outputs.result }}
          PRE_RELEASE_REQUESTED: ${{ inputs.pre_release }}
          CURRENT_MAJOR: ${{ steps.latest_version.outputs.current_major }}
          CURRENT_MINOR: ${{ steps.latest_version.outputs.current_minor }}
          CURRENT_PATCH: ${{ steps.latest_version.outputs.current_patch }}
        run: |
          set -euo pipefail

          major="${CURRENT_MAJOR:-0}"
          minor="${CURRENT_MINOR:-0}"
          patch="${CURRENT_PATCH:-0}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            bump_type="$MANUAL_BUMP"
          else
            bump_type="$PR_BUMP"
          fi

          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $bump_type" >&2
              exit 1
              ;;
          esac

          base_version="v${major}.${minor}.${patch}"
          new_tag="$base_version"
          is_prerelease=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$PRE_RELEASE_REQUESTED" == "true" ]]; then
            highest_rc=0

            while IFS= read -r tag; do
              rc_number="${tag#${base_version}-rc.}"

              if [[ "$rc_number" =~ ^[1-9][0-9]*$ ]] && (( rc_number > highest_rc )); then
                highest_rc=$rc_number
              fi
            done < <(git tag --list "${base_version}-rc.*")

            new_tag="${base_version}-rc.$((highest_rc + 1))"
            is_prerelease=true
          fi

          if git rev-parse --quiet --verify "refs/tags/$new_tag" >/dev/null; then
            echo "Tag $new_tag already exists." >&2
            exit 1
          fi

          echo "Current version: v${CURRENT_MAJOR}.${CURRENT_MINOR}.${CURRENT_PATCH}"
          echo "Bump type: $bump_type"
          echo "New version: $new_tag"

          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_tag" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "major_version=v$major" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Calculate Calendar Release Tag
        id: calendar_version
        shell: bash
        env:
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Pre-releases do not receive a calendar tag."
            echo "calendar_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          year=$(date -u +%Y)
          highest_release=0

          while IFS= read -r tag; do
            if [[ "$tag" =~ ^${year}\.([1-9][0-9]*)$ ]]; then
              release_number="${BASH_REMATCH[1]}"

              if (( release_number > highest_release )); then
                highest_release=$release_number
              fi
            fi
          done < <(git tag --list "${year}.*")

          calendar_tag="${year}.$((highest_release + 1))"

          if git rev-parse --quiet --verify "refs/tags/$calendar_tag" >/dev/null; then
            echo "Calendar tag $calendar_tag already exists." >&2
            exit 1
          fi

          echo "Calendar release tag: $calendar_tag"
          echo "calendar_tag=$calendar_tag" >> "$GITHUB_OUTPUT"

      - name: Generate Changelog
        id: changelog
        shell: bash
        env:
          LAST_TAG: ${{ steps.latest_version.outputs.latest_tag }}
          TARGET_COMMITISH: ${{ steps.target.outputs.target_commitish }}
        run: |
          set -euo pipefail

          if [[ "$LAST_TAG" != "v0.0.0" ]]; then
            changelog=$(git log --pretty=format:'- %s (%h)' "$LAST_TAG..$TARGET_COMMITISH")
          else
            changelog=$(git log --pretty=format:'- %s (%h)' "$TARGET_COMMITISH")
          fi

          if [[ -z "$changelog" ]]; then
            echo "No commits found for this release." >&2
            exit 1
          fi

          delimiter="CHANGELOG_$(date +%s%N)_${RANDOM}"

          {
            echo "changelog<<$delimiter"
            echo "$changelog"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release Tags
        shell: bash
        env:
          TARGET_COMMITISH: ${{ steps.target.outputs.target_commitish }}
          SEMVER_TAG: ${{ steps.version.outputs.new_tag }}
          MAJOR_TAG: ${{ steps.version.outputs.major_version }}
          CALENDAR_TAG: ${{ steps.calendar_version.outputs.calendar_tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$SEMVER_TAG" "$TARGET_COMMITISH" \
            -m "Release $SEMVER_TAG"

          refspecs=("refs/tags/$SEMVER_TAG:refs/tags/$SEMVER_TAG")

          if [[ "$IS_PRERELEASE" != "true" ]]; then
            git tag -a "$CALENDAR_TAG" "$TARGET_COMMITISH" \
              -m "Calendar release $CALENDAR_TAG — $SEMVER_TAG"

            # The major tag is a moving compatibility alias, such as v1.
            git tag -fa "$MAJOR_TAG" "$TARGET_COMMITISH" \
              -m "Latest compatible release for $MAJOR_TAG"

            refspecs+=("refs/tags/$CALENDAR_TAG:refs/tags/$CALENDAR_TAG")
            refspecs+=("+refs/tags/$MAJOR_TAG:refs/tags/$MAJOR_TAG")
          fi

          echo "Publishing tags:"
          printf '  %s\n' "${refspecs[@]}"

          # Publish exact tags and the moving major alias as one transaction.
          git push --atomic origin "${refspecs[@]}"

      - name: Write release notes
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          SEMVER_TAG: ${{ steps.version.outputs.new_tag }}
          MAJOR_TAG: ${{ steps.version.outputs.major_version }}
          CALENDAR_TAG: ${{ steps.calendar_version.outputs.calendar_tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
          LAST_TAG: ${{ steps.latest_version.outputs.latest_tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_heading="$SEMVER_TAG"
          else
            release_heading="$CALENDAR_TAG — $SEMVER_TAG"
          fi

          {
            echo "## Changes in $release_heading"
            echo
            printf '%s\n' "$CHANGELOG"
            echo
            echo "### Release identifiers"
            echo
            echo "- Semantic version: \`$SEMVER_TAG\`"

            if [[ "$IS_PRERELEASE" != "true" ]]; then
              echo "- Calendar release: \`$CALENDAR_TAG\`"
              echo "- Moving compatibility tag: \`$MAJOR_TAG\`"
            fi

            echo
            echo "### Workflow Usage"
            echo
            echo '```yaml'

            if [[ "$IS_PRERELEASE" != "true" ]]; then
              echo "# Pin to the compatible major version (recommended)"
              echo "uses: $REPOSITORY/.github/workflows/notebook-ci-unified.yml@$MAJOR_TAG"
              echo
            fi

            echo "# Pin to this exact version"
            echo "uses: $REPOSITORY/.github/workflows/notebook-ci-unified.yml@$SEMVER_TAG"

            if [[ "$IS_PRERELEASE" != "true" ]]; then
              echo
              echo "# Pin to the organizational calendar release"
              echo "uses: $REPOSITORY/.github/workflows/notebook-ci-unified.yml@$CALENDAR_TAG"
            fi

            echo '```'
            echo

            if [[ "$LAST_TAG" != "v0.0.0" ]]; then
              echo "**Full Changelog**: https://github.com/$REPOSITORY/compare/$LAST_TAG...$SEMVER_TAG"
            else
              echo "**Release history**: https://github.com/$REPOSITORY/commits/$SEMVER_TAG"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMVER_TAG: ${{ steps.version.outputs.new_tag }}
          CALENDAR_TAG: ${{ steps.calendar_version.outputs.calendar_tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_title="Prerelease $SEMVER_TAG"
          else
            release_title="$CALENDAR_TAG — $SEMVER_TAG"
          fi

          args=(
            "$SEMVER_TAG"
            --title "$release_title"
            --notes-file release-notes.md
            --verify-tag
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease --latest=false)
          else
            args+=(--latest)
          fi

          gh release create "${args[@]}"

      - name: Update Example Workflows
        if: steps.version.outputs.is_prerelease != 'true'
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          MAJOR_VERSION: ${{ steps.version.outputs.major_version }}
        run: |
          set -euo pipefail

          if [[ ! -d examples/workflows ]]; then
            echo "No examples/workflows directory found; skipping."
            exit 0
          fi

          # Work from the latest main branch so the post-release documentation
          # commit does not overwrite changes merged while this run was active.
          git fetch origin main
          git checkout -B main origin/main

          python <<'PY'
          import os
          import re
          from pathlib import Path

          repository = os.environ["REPOSITORY"]
          major_version = os.environ["MAJOR_VERSION"]
          root = Path("examples/workflows")

          workflow_reference = re.compile(
              rf"(uses:\s*['\"]?{re.escape(repository)}/\.github/workflows/[^@\s]+)"
              rf"@(main|v[0-9]+(?:\.[0-9]+){{0,2}}(?:-[^\s'\"]+)?)"
          )

          for path in [*root.rglob("*.yml"), *root.rglob("*.yaml")]:
              original = path.read_text(encoding="utf-8")
              updated = original.replace("your-org/dev-actions/", f"{repository}/")
              updated = workflow_reference.sub(rf"\1@{major_version}", updated)

              if updated != original:
                  path.write_text(updated, encoding="utf-8")
                  print(f"Updated {path}")
          PY

          if git diff --quiet -- examples/workflows; then
            echo "No example workflow changes to commit."
            exit 0
          fi

          git add examples/workflows/
          git commit -m "Update example workflows to use $MAJOR_VERSION"
          git push origin HEAD:main

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Notify Success
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              return;
            }

            const semver = '${{ needs.release.outputs.new_version }}';
            const major = '${{ needs.release.outputs.major_version }}';
            const calendar = '${{ needs.release.outputs.calendar_tag }}';
            const isPrerelease = '${{ needs.release.outputs.is_prerelease }}' === 'true';

            const identifiers = isPrerelease
              ? `**New prerelease:** \`${semver}\``
              : `**Calendar release:** \`${calendar}\`\n**Semantic version:** \`${semver}\``;

            const usage = isPrerelease
              ? `# Pin to this exact prerelease\nuses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${semver}`
              : `# Recommended: compatible major version\nuses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${major}\n\n# Exact semantic version\nuses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${semver}\n\n# Organizational calendar release\nuses: ${{ github.repository }}/.github/workflows/notebook-ci-unified.yml@${calendar}`;

            const body = [
              '🎉 **Release Created Successfully!**',
              '',
              identifiers,
              '',
              '### Usage in Workflows',
              '',
              '```yaml',
              usage,
              '```',
              '',
              `[View Release](https://github.com/${{ github.repository }}/releases/tag/${semver})`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

