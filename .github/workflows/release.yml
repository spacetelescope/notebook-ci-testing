name: Cut release

# Manual release. Product owners pick "major" or "minor" from a dropdown.
# Bumps the internal SemVer accordingly, pushes both a SemVer tag (canonical,
# for CI) and a CalVer tag (product-facing), then creates a GitHub Release
# titled with the CalVer and auto-generated notes since the last release.
#
# SemVer is monotonic and never resets (CI / package tooling depends on this).
# CalVer (YEAR.MAJOR.MINOR) resets each new calendar year: the first release of
# a new year is always {year}.1.0. The two version numbers therefore diverge
# over time by design — both tags live on every release commit.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Which part of the version to bump'
        type: choice
        required: true
        default: minor
        options:
          - minor
          - major

permissions:
  contents: write
  id-token: write

env:
  RELEASE_DISPLAY_NAME: "Notebook CI Testing"

concurrency:
  group: version-tagging
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          # --- SemVer: canonical, monotonic, never resets ---
          latest_semver="$(git tag -l 'v*.*.*' | sort -V | tail -n1)"
          [ -z "$latest_semver" ] && latest_semver="v0.0.0"
          core="${latest_semver#v}"
          IFS='.' read -r s_major s_minor s_patch <<< "$core"
          case "${{ inputs.release_type }}" in
            major) s_major=$((s_major + 1)); s_minor=0; s_patch=0 ;;
            minor)                           s_minor=$((s_minor + 1)); s_patch=0 ;;
            *) echo "Unknown release_type: ${{ inputs.release_type }}" >&2; exit 1 ;;
          esac
          semver="v${s_major}.${s_minor}.${s_patch}"

          # --- CalVer: YEAR.MAJOR.MINOR, resets every new calendar year ---
          year="$(date +%Y)"
          latest_calver="$(git tag -l "${year}.*.*" | sort -V | tail -n1)"
          if [ -z "$latest_calver" ]; then
            c_major=1; c_minor=0
          else
            IFS='.' read -r _ c_major c_minor <<< "$latest_calver"
            case "${{ inputs.release_type }}" in
              major) c_major=$((c_major + 1)); c_minor=0 ;;
              minor)                           c_minor=$((c_minor + 1)) ;;
            esac
          fi
          calver="${year}.${c_major}.${c_minor}"

          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "calver=$calver" >> "$GITHUB_OUTPUT"
          echo "Releasing ${latest_semver} -> ${semver}  (CalVer ${calver})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}

      - name: Bump roman_dependencies version and pin requirements
        shell: bash
        run: |
          set -euo pipefail
          calver="${{ steps.ver.outputs.calver }}"

          sed -i "s/^version = .*/version = \"$calver\"/" pyproject.toml

          find notebooks -name requirements.txt | while IFS= read -r f; do
            sed -i "s|roman_dependencies[^[:space:]]*|roman_dependencies==$calver|" "$f"
          done

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml notebooks/*/requirements.txt
          git commit -m "Bump roman_dependencies to ${{ steps.ver.outputs.calver }}" || echo "Nothing to commit"

      - name: Build package
        run: |
          pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create and push tags
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main
          git tag "${{ steps.ver.outputs.semver }}"
          git tag "${{ steps.ver.outputs.calver }}"
          git push origin "${{ steps.ver.outputs.semver }}" "${{ steps.ver.outputs.calver }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          CALVER: ${{ steps.ver.outputs.calver }}
        shell: bash
        run: |
          set -euo pipefail
          display_name="${RELEASE_DISPLAY_NAME:-}"
          if [ -z "$display_name" ]; then
            raw="${GITHUB_REPOSITORY##*/}"
            display_name="$(printf '%s' "$raw" | tr '-_' '  ' \
              | awk '{for (i=1; i<=NF; i++) $i=toupper(substr($i,1,1)) substr($i,2)} 1')"
          fi
          gh release create "$CALVER" \
            --title "${display_name} - ${CALVER}" \
            --generate-notes \
            --verify-tag \
            --latest

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Release cut :rocket:"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Type | ${{ inputs.release_type }} |"
            echo "| CalVer (product) | \`${{ steps.ver.outputs.calver }}\` |"
            echo "| SemVer (internal) | \`${{ steps.ver.outputs.semver }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
